<!DOCTYPE html>

    <style>
        body {

        .form-link {
    background: linear-gradient(45deg, rgb(238, 107, 19), #4aa44f);
    border: none;
    color: black;
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    margin-top: 15px;
    width: 80%;
    box-shadow: 0 0 15px cyan;
}

.form-link:hover {
    transform: scale(1.1);
}
.login-container h3{
    color: darkblue;
}
.meteor {
    position: absolute;
    top: -10px;
    background-color: rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: meteor-shower 5s linear infinite;
    background-color: rgb(225, 85, 246);
}

.mascot {
    position: relative;
    width: 140px;
    margin: 0 auto 20px;
}

.face {
    width: 140px;
    height: 140px;
    background: #ffd6e7;
    border-radius: 50%;
    position: relative;
    border: 3px solid #333;
}

/* 👀 ตา */
.eyes {
    display: flex;
    justify-content: space-around;
    position: absolute;
    top: 40px;
    width: 100%;
    transition: 0.3s;
}

.eye {
    width: 35px;
    height: 35px;
    background: white;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
}

.pupil {
    width: 14px;
    height: 14px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 10px;
    left: 10px;
    transition: 0.05s;
}

/* 😊 แก้ม */
.blush {
    width: 18px;
    height: 12px;
    background: #ff9bb3;
    border-radius: 50%;
    position: absolute;
    top: 75px;
}

.left { left: 18px; }
.right { right: 18px; }

/* 😊 ปาก */
.mouth {
    width: 25px;
    height: 12px;
    border-bottom: 3px solid #333;
    border-radius: 0 0 20px 20px;
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
}

/* ✋ มือ */
.hands {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.hand {
    width: 50px;
    height: 50px;
    background: #ffd6e7;
    border: 3px solid #333;
    border-radius: 50%;
    position: absolute;
    top: 90px;
    transition: all 0.4s ease;
}

/* ตำแหน่งเริ่มต้น */
.left-hand {
    left: -10px;
}

.right-hand {
    right: -10px;
}

/* 😳 ตอนเขิน (ปิดตา) */
.mascot.cover .left-hand {
    top: 30px;
    left: 15px;
    transform: rotate(-30deg);
}

.mascot.cover .right-hand {
    top: 30px;
    right: 15px;
    transform: rotate(30deg);
}

/* ซ่อนตา */
.mascot.cover .eyes {
    opacity: 0;
}

/* ✨ เพิ่ม bounce น่ารัก */
.mascot {
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}
    </style>
</head>
<body>

<div class="mascot">

    <script>
    const API_BASE_URL = "https://projectcs30-github-io.onrender.com";

    
    async function handleLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const loginType = document.getElementById('loginType').value;  // ดึงค่า loginType
        // ตั้งค่า loginType ใน localStorage
        localStorage.setItem("loginType", loginType.toLowerCase()); 

    if (!username || !password) {
        alert('Please fill in all fields.');
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password, type: loginType })
        });

        if (response.ok) {
            const data = await response.json();
            // เก็บชื่อผู้ใช้ใน sessionStorage
            sessionStorage.setItem('username', username);
            alert(`${data.type} login successful!`);
            
            // ตรวจสอบ loginType และไปยังหน้าที่เหมาะสม
            if (loginType === "admin" || loginType === "Admin") {
                window.location.href = "start.html";  // ถ้า login เป็น Admin ไปยัง start.html
            } else if (loginType === "player" || loginType === "Player") {
                window.location.href = "play.html";  // ถ้า login เป็น Player ไปยัง play.html
            }
        } else {
            alert('Invalid credentials');
        }
    } catch (error) {
        console.error('Error during login:', error);
        alert('An error occurred during login. Please try again.');
    }
}

async function handleLogout() {
    const username = sessionStorage.getItem('username');
    
    if (username) {
        socket.emit('player-offline', username);  // แจ้งเซิร์ฟเวอร์ให้เปลี่ยนเป็น Offline
        sessionStorage.removeItem('username');
    }

    window.location.href = "index.html";
}
window.addEventListener("beforeunload", function () {
    const username = sessionStorage.getItem('username');
    if (username) {
        socket.emit("player-offline", username);
    }
});


async function handleRegister() {
    const username = document.getElementById('registerUsername').value;
    const password = document.getElementById('registerPassword').value;
    const type = document.getElementById('registerType').value;
    const email = document.getElementById('registerEmail').value;  // เพิ่มฟิลด์ email

    if (!username || !password || !email) {  // ตรวจสอบว่ามีข้อมูลครบถ้วน
        alert('Please fill in all fields.');
        return;
    }

    try {
        const response = await fetch(`https://projectcs30-github-io.onrender.com/register`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password, type, email }),  // ส่ง email ไปด้วย
        });

        if (response.ok) {
            alert('Registration successful! You can now log in.');
            showLoginForm();
        } else {
            const errorText = await response.text();
            alert(`Registration failed: ${errorText}`);
        }
    } catch (error) {
        console.error('Error during registration:', error);
        alert('An error occurred during registration. Please try again.');
    }
}
    
async function handlePasswordReset() {
    const type = document.getElementById('resetType').value;  // ดึงค่า type            
    const username = document.getElementById('resetUsername').value;
    const email = document.getElementById('resetEmail').value
    const otpCode = document.getElementById('otpCode').value;
    const newPassword = document.getElementById('newPassword').value;

    if (!username || !newPassword || !email || !otpCode || !type) {
        alert('Please fill in all fields: type, username, oldPassword, newPassword, and OTP.');
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/reset-password2`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ type, username, newPassword,email, otpCode }),
        });

        if (response.ok) {
            alert('Password reset successful!');
            showLoginForm();
        } else {
            const errorText = await response.text();
            alert(`Failed to reset password: ${errorText}`);
        }
    } catch (error) {
        console.error('Error during password reset:', error);
        alert('An error occurred during password reset. Please try again.');
    }
}

async function sendOTP() {
    const email = document.getElementById('resetEmail').value;  // รับ email จากฟอร์ม
    const username = document.getElementById('resetUsername').value;  // รับ username จากฟอร์ม
    const type = document.getElementById('resetType').value;  // ดึงค่า type

    if (!email || !username || !type) {
        alert('Please enter your email and username to receive the OTP.');
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/send-otp`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, username, type }),  // ส่ง email และ username ไปด้วย
        });

        if (response.ok) {
            alert('OTP has been sent to your email.');
            // แสดงฟิลด์รหัสผ่านใหม่และปุ่มรีเซ็ตรหัสผ่านหลังจาก OTP ถูกส่ง
            document.getElementById('newPasswordGroup').style.display = 'block';
            document.getElementById('resetPasswordBtn').style.display = 'block';
        } else {
            const errorText = await response.text();
            alert(`Failed to send OTP: ${errorText}`);
        }
    } catch (error) {
        console.error('Error during OTP sending:', error);
        alert('An error occurred while sending OTP. Please try again.');
    }
}

        function showRegisterForm() {
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('loginForm').parentNode.style.display = 'none';
    document.getElementById('resetPasswordForm').style.display = 'none';
}

function showLoginForm() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').parentNode.style.display = 'block';
    document.getElementById('resetPasswordForm').style.display = 'none';
}

function showResetPasswordForm() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').parentNode.style.display = 'none';
    document.getElementById('resetPasswordForm').style.display = 'block';
}

const socket = io();
async function handleLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const loginType = document.getElementById('loginType').value;

    if (!username || !password) {
        alert('Please fill in all fields.');
        return;
    }

    try {
        const response = await fetch('https://projectcs30-github-io.onrender.com/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, type: loginType })
        });

        if (response.ok) {
            const data = await response.json();
            sessionStorage.setItem("username", data.username);
            sessionStorage.setItem("loginType", data.type);
            socket.emit('player-online', username);  // 📌 แจ้งเซิร์ฟเวอร์ว่าผู้เล่น Online
            alert(`${data.type} login successful!`);
            
            if (loginType === 'Admin') {
                window.location.href = "start.html";
            } else {
                window.location.href = "play.html";
            }
        } else {
            alert('Invalid credentials');
        }
    } catch (error) {
        console.error('Error during login:', error);
        alert('An error occurred during login. Please try again.');
    }
}

// เสียงปุ่ม
    // ฟังก์ชันเล่นเสียงแบบไม่มีดีเลย์
    function playSound(sound) {
        sound.pause();        // หยุดเสียงก่อนหน้า (ถ้ามี)
        sound.currentTime = 0; // รีเซ็ตไปจุดเริ่มต้น
        sound.play();         // เล่นเสียงใหม่ทันที
    }

const oSound = document.getElementById("o-sound");

//เสียง
document.getElementById("login").addEventListener("click", () => playSound(oSound));
document.getElementById("register").addEventListener("click", () => playSound(oSound));
document.getElementById("otp").addEventListener("click", () => playSound(oSound));
document.getElementById("reset").addEventListener("click", () => playSound(oSound));
document.addEventListener("DOMContentLoaded", function() {
    const music = document.getElementById("background-music");

    // ลองเล่นเพลงเมื่อโหลดหน้าเว็บ (ถ้าบราวเซอร์ไม่บล็อก)
    music.play().catch(error => {
        console.warn("Autoplay ถูกบล็อก! กำลังรอการโต้ตอบจากผู้ใช้...");
    });

    // ถ้าโดนบล็อก ให้เล่นใหม่เมื่อมีการโต้ตอบกับหน้าเว็บ
    document.addEventListener("click", function() {
        if (music.paused) {
            music.play();
        }
    });
});


// สร้างดาวตกใหม่
function createMeteor() {
    const meteor = document.createElement('div');
    meteor.classList.add('meteor');
    document.body.appendChild(meteor);
    
    // กำหนดตำแหน่งและทิศทางของดาว
    meteor.style.left = `${Math.random() * 100}vw`;
    meteor.style.animationDuration = `${Math.random() * 5 + 5}s`;  // ทำให้ตกช้าๆ

    // ทำให้ดาวมีขนาดและความโปร่งแสงแตกต่างกัน
    meteor.style.width = `${Math.random() * 3 + 4}px`;
    meteor.style.height = `${Math.random() * 3 + 4}px`;
    meteor.style.opacity = Math.random() * 0.5 + 0.5;

    // ลบดาวหลังจากการเคลื่อนไหวเสร็จ
    setTimeout(() => {
        meteor.remove();
    }, (Math.random() * 5 + 5) * 1000);  // ลบดาวตามเวลาของ animation
}

// สร้างดาวตกทุกๆ 0.5 วินาที
setInterval(createMeteor, 500);
// 👀 ตามเมาส์
document.addEventListener("mousemove", (e) => {
    const pupils = document.querySelectorAll(".pupil");

    pupils.forEach(pupil => {
        const rect = pupil.parentElement.getBoundingClientRect();
        const eyeX = rect.left + rect.width / 2;
        const eyeY = rect.top + rect.height / 2;

        const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);

        const moveX = Math.cos(angle) * 6;
        const moveY = Math.sin(angle) * 6;

        pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
});

// 😳 เขินตอนพิมพ์ password
const passwordInput = document.querySelector('input[type="password"]');
const mascot = document.querySelector('.mascot');

passwordInput.addEventListener("focus", () => {
    mascot.classList.add("cover");
});

passwordInput.addEventListener("blur", () => {
    mascot.classList.remove("cover");
});
